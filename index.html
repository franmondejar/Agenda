<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Flash - Francisco Mondéjar</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0e0e0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        
        .header-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .logo-img { width: 70px; height: 70px; border-radius: 15px; margin-bottom: 5px; }
        h1 { font-size: 1.4rem; margin: 0; color: #333; }

        .card { background: #eeeeee; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
        h2 { color: #1a73e8; font-size: 1.1rem; margin-top: 0; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; outline: none; }

        .flash-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .btn-flash { background: #d0d7de; color: #1a73e8; border: none; padding: 8px 15px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; }

        .btn-principal { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 5px; }

        .contenedor-lista { width: 100%; max-width: 400px; }
        .bloque-busqueda { display: flex; gap: 8px; margin-bottom: 10px; }
        .busqueda-txt { background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23add8e6" class="bi bi-search" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>') no-repeat 10px center; padding-left: 35px !important; }
        
        .controles-lista { background: #d9d9d9; padding: 10px 15px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .btn-borrar { color: #d93025; font-weight: bold; cursor: pointer; border: none; background: none; font-size: 0.85rem; }

        .item-aviso { background: #e6e6e6; padding: 15px; margin-bottom: 2px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #ccc; border-left: 5px solid #1a73e8; }
        .item-aviso:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
        .item-aviso.pasado { border-left-color: #d93025; background: #fff0f0; }

        .item-info { flex: 1; text-align: right; }
        .item-info strong { font-size: 1rem; display: block; color: #000; }
        .item-info small { color: #666; font-size: 0.85rem; font-weight: bold; }
        
        .chk-box { width: 18px; height: 18px; }

        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.75rem; color: #666; width: 100%; max-width: 400px; }
        .cc-icons { margin-top: 5px; display: flex; justify-content: center; gap: 5px; opacity: 0.6; }
        .cc-icons img { height: 18px; }
    </style>
</head>
<body>

    <div class="header-logo">
        <img src="img/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3652/3652191.png'">
        <h1>Agenda Flash</h1>
    </div>

    <div class="card">
        <h2>🚀 Nuevo Recordatorio</h2>
        <input type="text" id="titulo" placeholder="¿Qué vas a hacer?">
        
        <div class="flash-container">
            <div class="btn-flash" onclick="setFlash(1)">+1 Día</div>
            <div class="btn-flash" onclick="setFlash(7)">+1 Semana</div>
            <div class="btn-flash" onclick="setFlash(30)">+1 Mes</div>
        </div>

        <input type="datetime-local" id="fecha">
        <button class="btn-principal" onclick="crearAlarma()">Añadir a la Agenda</button>
    </div>

    <div class="contenedor-lista">
        <div class="bloque-busqueda">
            <input type="text" id="busquedaTexto" class="busqueda-txt" placeholder="Buscar por nombre..." onkeyup="render()">
            <input type="date" id="busquedaFecha" onchange="render()" style="flex: 0.6; padding: 8px;">
        </div>

        <div class="controles-lista">
            <label style="display:flex; align-items:center; gap:5px;"><input type="checkbox" id="checkTodos" onclick="seleccionarTodo(this.checked)"> Todos</label>
            <button class="btn-borrar" onclick="borrarSeleccionados()">Borrar</button>
        </div>
        <div id="listaItems"></div>
    </div>

    <footer>
        <p>Diseñado y creado con ❤️ por Francisco Mondéjar</p>
        <p>Este software está bajo licencia:</p>
        <strong>Creative Commons BY-NC-SA 4.0</strong>
        <div class="cc-icons">
            <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="CC"> <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="BY"> <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="NC"> <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="SA">
        </div>
        <p style="margin-top:5px;">Atribución - No Comercial - Compartir Igual</p>
    </footer>

    <script>
        let avisos = JSON.parse(localStorage.getItem('agenda_v_final_fm')) || [];

        function setFlash(d) {
            const f = new Date(); f.setDate(f.getDate() + d);
            const offset = f.getTimezoneOffset() * 60000;
            document.getElementById('fecha').value = new Date(f - offset).toISOString().slice(0, 16);
        }

        function crearAlarma() {
            const t = document.getElementById('titulo').value;
            const d = document.getElementById('fecha').value;
            if(!t || !d) return alert("Rellena título y fecha");
            avisos.push({ id: Date.now(), titulo: t, fecha: d });
            guardarYRender();
            document.getElementById('titulo').value = "";
        }

        function guardarYRender() {
            localStorage.setItem('agenda_v_final_fm', JSON.stringify(avisos));
            render();
        }

        function render() {
            const listaUI = document.getElementById('listaItems');
            const bTexto = document.getElementById('busquedaTexto').value.toLowerCase();
            const bFecha = document.getElementById('busquedaFecha').value;
            listaUI.innerHTML = "";
            
            let filtrados = avisos.filter(a => a.titulo.toLowerCase().includes(bTexto));
            if (bFecha) filtrados = filtrados.filter(a => a.fecha.split('T')[0] === bFecha);
            
            filtrados.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
            
            filtrados.forEach(a => {
                const item = document.createElement('div');
                const esPasado = new Date(a.fecha) < new Date();
                item.className = "item-aviso" + (esPasado ? " pasado" : "");
                
                item.innerHTML = `
                    <input type="checkbox" class="chk chk-box" value="${a.id}" onclick="actualizarIU()">
                    <div class="item-info">
                        <strong>${a.titulo}</strong>
                        <small>${new Date(a.fecha).toLocaleString([], {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</small>
                    </div>
                `;
                listaUI.appendChild(item);
            });
        }

        function seleccionarTodo(v) {
            document.querySelectorAll('.chk').forEach(c => c.checked = v);
        }

        function borrarSeleccionados() {
            const ids = Array.from(document.querySelectorAll('.chk:checked')).map(c => parseInt(c.value));
            if(ids.length > 0 && confirm("¿Eliminar seleccionados?")) {
                avisos = avisos.filter(a => !ids.includes(a.id));
                guardarYRender();
            }
        }

        function actualizarIU() {
            const todos = document.querySelectorAll('.chk').length;
            const seleccionados = document.querySelectorAll('.chk:checked').length;
            document.getElementById('checkTodos').checked = (todos > 0 && todos === seleccionados);
        }

        window.onload = render;
    </script>
</body>
</html>
